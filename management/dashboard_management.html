<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* Reset */
* {margin:0; padding:0; box-sizing:border-box; font-family:'Roboto',sans-serif;}
body {display:flex; min-height:100vh; background:#f5f6fa; color:#222; transition:0.3s;}

/* Sidebar */
.sidebar {
    width:260px; background:linear-gradient(180deg,#4e54c8,#8f94fb);
    color:white; display:flex; flex-direction:column; padding-top:30px;
    box-shadow:2px 0 20px rgba(0,0,0,0.15); transition:0.3s;
}
.sidebar h2 {text-align:center; margin-bottom:40px; font-weight:800; font-size:22px; letter-spacing:1px;}
.sidebar button {
    background:none; border:none; color:white; padding:18px 25px; text-align:left;
    font-size:15px; cursor:pointer; display:flex; align-items:center; gap:12px;
    border-radius:8px; margin:5px; transition:0.3s;
}
.sidebar button i {font-style:normal; font-weight:bold; font-size:18px;}
.sidebar button:hover, .sidebar button.active {background:rgba(255,255,255,0.2); transform:translateX(5px);}

/* Main content */
.main {flex:1; padding:30px; display:flex; flex-direction:column; overflow-x:auto; transition:0.3s;}

/* Cards */
.cards {display:flex; flex-wrap:wrap; gap:25px; margin-bottom:35px;}
.card {
    flex:1; min-width:180px; background:linear-gradient(145deg,#fff,#e6e6ff);
    padding:25px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.4s; text-align:center; position:relative;
}
.card::after {
    content:""; position:absolute; top:0; left:0; width:100%; height:100%;
    border-radius:15px; pointer-events:none; background:linear-gradient(120deg,#ff80b5,#9089fc);
    opacity:0; transition:0.5s;
}
.card:hover::after {opacity:0.1;}
.card h3 {font-size:14px; color:#4e54c8; margin-bottom:14px; font-weight:500;}
.card p {font-size:24px; font-weight:700; color:#222; transition:0.3s;}

/* Table */
table {width:100%; border-collapse:collapse; border-radius:10px; overflow:hidden; background:white; box-shadow:0 10px 20px rgba(0,0,0,0.05);}
th, td {padding:14px; border-bottom:1px solid #eee; text-align:center; font-size:14px;}
th {background:#4e54c8; color:white; font-weight:600;}
tr:hover {background:#f4f4ff; transition:0.3s;}
.status-aktif {color:green; font-weight:700;}
.status-selesai {color:gray; font-weight:700;}
.status-sudah {color:blue; font-weight:700;}
.status-baru {color:red; font-weight:700;}

/* Tabs */
.tab {display:none;}
.tab.active {display:block;}

/* Forms */
form input, form select, form textarea, form button {
    width:100%; padding:14px; margin-bottom:14px; border-radius:10px; border:1px solid #ccc; font-size:14px;
    transition:0.3s;
}
form input:focus, form select:focus, form textarea:focus {border-color:#4e54c8; outline:none; box-shadow:0 0 8px rgba(78,84,200,0.3);}
form button {background:#4e54c8; color:white; border:none; cursor:pointer; font-weight:600; transition:0.3s;}
form button:hover {background:#3b3f9a; transform:translateY(-2px);}

/* Search Input */
#cariFilter {padding:12px; width:100%; border-radius:8px; border:1px solid #ccc; margin-bottom:15px; transition:0.3s;}
#cariFilter:focus {border-color:#4e54c8; box-shadow:0 0 8px rgba(78,84,200,0.3);}

/* Responsive */
@media (max-width:1000px){
    body {flex-direction:column;}
    .sidebar {width:100%; flex-direction:row; overflow-x:auto; padding-top:10px;}
    .sidebar h2 {display:none;}
    .sidebar button {flex:1; text-align:center; margin:2px;}
    .cards {flex-direction:column;}
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>DASHBOARD</h2>
    <button class="tab-btn active" data-tab="home"><i>🏠</i> Beranda</button>
    <button class="tab-btn" data-tab="pengajuan"><i>📋</i> Pengajuan</button>
    <button class="tab-btn" data-tab="riwayat"><i>📝</i> Riwayat</button>
    <button class="tab-btn" data-tab="ganti"><i>🔒</i> Ganti Password</button>
    <button class="tab-btn" data-tab="logout"><i>🚪</i> Logout</button>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Home Cards -->
    <div class="tab active" id="home">
        <div class="cards">
            <div class="card"><h3>Total Free Parkir (LSG) Aktif</h3><p id="totalAktif">0</p></div>
            <div class="card"><h3>Total Belum Diinput</h3><p id="totalBelumCard">0</p></div>
            <div class="card"><h3>Total Status Aktif</h3><p id="totalStatusAktif">0</p></div>
            <div class="card"><h3>Total Compliment Aktif</h3><p id="totalCompliment">0</p></div>
            <div class="card"><h3>Nama User</h3><p id="namaUser">-</p></div>
        </div>
    </div>

    <!-- Riwayat -->
    <div class="tab" id="riwayat">
        <input type="text" id="cariFilter" placeholder="Cari di semua kolom...">
        <button onclick="exportExcel()" style="margin-bottom:12px; padding:12px 20px; border-radius:8px;">Export Excel</button>
        <table>
            <thead>
                <tr>
                    <th>Jenis</th>
                    <th>Nama</th>
                    <th>Dept</th>
                    <th>Plat</th>
                    <th>Kendaraan</th>
                    <th>Periode</th>
                    <th>Keterangan</th>
                    <th>Masa Free</th>
                    <th>Status Admin</th>
                </tr>
            </thead>
            <tbody id="riwayatData"></tbody>
        </table>
    </div>

    <!-- Pengajuan -->
    <div class="tab" id="pengajuan">
        <form id="formPengajuan" autocomplete="off">
            <select name="jenis_pengajuan" required>
                <option value="">-- Pilih Jenis --</option>
                <option value="Free Parkir">Free Parkir</option>
                <option value="Compliment">Compliment</option>
                <option value="Ubah Plat">Ubah Plat</option>
            </select>
            <input type="text" name="nama" placeholder="Nama" required>
            <input type="text" name="departement" placeholder="Departement" required>
            <div id="nopolContainer"></div>
            <button type="button" id="addNopol">+ Tambah Plat</button>
            <input type="text" name="jenis_kendaraan" placeholder="Jenis Kendaraan">
            <input type="date" name="periode_awal" required>
            <input type="date" name="periode_akhir" required>
            <textarea name="keterangan" placeholder="Keterangan"></textarea>
            <button type="submit">Kirim</button>
        </form>
    </div>

    <!-- Ganti Password -->
    <div class="tab" id="ganti">
        <form>
            <input type="password" placeholder="Password Lama">
            <input type="password" placeholder="Password Baru">
            <button type="submit">Ganti Password</button>
        </form>
    </div>

    <!-- Logout -->
    <div class="tab" id="logout">
        <button onclick="logout()" style="padding:12px 18px; border-radius:8px;">Keluar</button>
    </div>
</div>

<!-- Firebase & JS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCaPM6CNaiK-VZYR0-dkrrYMANiWi8pUGw",
  authDomain: "memodigital-57c0c.firebaseapp.com",
  projectId: "memodigital-57c0c",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Sidebar Tabs
document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        document.getElementById(btn.dataset.tab).classList.add("active");
    };
});

// Logout
function logout(){ sessionStorage.clear(); window.location.href="login_management.html"; }

// Add Nopol
document.getElementById("addNopol").addEventListener("click", function(){
    const div=document.createElement("div");
    div.className="nopol-group";
    div.innerHTML=`
        <input type="text" name="nomor_plat" placeholder="Nomor Plat" required>
        <button type="button" onclick="this.parentElement.remove()">X</button>
    `;
    document.getElementById("nopolContainer").appendChild(div);
});
document.getElementById("addNopol").click();

// Export Excel
function exportExcel(){
    const table=document.querySelector("#riwayat table");
    const wb=XLSX.utils.table_to_book(table,{sheet:"Riwayat"});
    XLSX.writeFile(wb,"Data_Riwayat.xlsx");
}

// Load Data
const riwayatBody = document.getElementById('riwayatData');
const totalAktifEl = document.getElementById('totalAktif');
const totalBelumEl = document.getElementById('totalBelumCard');
const totalComplimentEl = document.getElementById('totalCompliment');
const totalStatusAktifEl = document.getElementById('totalStatusAktif');
let dataGlobal = [];

function renderRow(data, plat, statusAdmin){
    const today = new Date();
    const awal = new Date(data.periode_awal);
    const akhir = new Date(data.periode_akhir);
    let masaFree = (today>=awal && today<=akhir) ? "<span class='status-aktif'>Aktif</span>" : "<span class='status-selesai'>Selesai</span>";
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td>${data.jenis_pengajuan||''}</td>
        <td>${data.nama||''}</td>
        <td>${data.departement||''}</td>
        <td>${plat||''}</td>
        <td>${data.jenis_kendaraan||''}</td>
        <td>${data.periode_awal||''} s/d ${data.periode_akhir||''}</td>
        <td>${data.keterangan||''}</td>
        <td>${masaFree}</td>
        <td>${statusAdmin==="Sudah"?'<span class="status-sudah">Sudah</span>':'Belum'}</td>
    `;
    riwayatBody.appendChild(tr);
}

function loadData(){
    riwayatBody.innerHTML="";
    dataGlobal=[];
    let totalAktif=0, totalBelum=0, totalCompliment=0, totalStatusAktif=0;
    const today = new Date();
    db.collection("pengajuan").orderBy("timestamp","desc").get().then(snapshot=>{
        if(snapshot.empty){
            riwayatBody.innerHTML="<tr><td colspan='9'>Belum ada data</td></tr>";
            totalAktifEl.textContent=0;
            totalBelumEl.textContent=0;
            totalComplimentEl.textContent=0;
            totalStatusAktifEl.textContent=0;
            return;
        }
        snapshot.forEach(doc=>{
            const d = doc.data();
            const platArray = Array.isArray(d.nomor_plat)?d.nomor_plat:[d.nomor_plat];
            const statusArray = Array.isArray(d.status_admin_per_plat)?d.status_admin_per_plat:platArray.map(p=>"Belum");
            platArray.forEach((plat,i)=>{
                renderRow(d, plat, statusArray[i]);
                if(today>=new Date(d.periode_awal) && today<=new Date(d.periode_akhir)) totalAktif++;
                if(statusArray[i]!=="Sudah") totalBelum++;
                if(d.jenis_pengajuan==="Compliment" && statusArray[i]!=="Sudah") totalCompliment++;
                if(today>=new Date(d.periode_awal) && today<=new Date(d.periode_akhir)) totalStatusAktif++;
            });
            dataGlobal.push({id:doc.id, ...d, platArray, statusArray});
        });
        totalAktifEl.textContent=totalAktif;
        totalBelumEl.textContent=totalBelum;
        totalComplimentEl.textContent=totalCompliment;
        totalStatusAktifEl.textContent=totalStatusAktif;
        document.getElementById('namaUser').textContent = sessionStorage.getItem('username') || '-';
    });
}

loadData();

// Global Filter
document.getElementById('cariFilter').addEventListener('input', function(){
    const val=this.value.toLowerCase();
    riwayatBody.querySelectorAll('tr').forEach(tr=>{
        const text=tr.textContent.toLowerCase();
        tr.style.display = text.includes(val)?'':'none';
    });
});

// --- Form Pengajuan Submit ---
const formPengajuan = document.getElementById('formPengajuan');

// Buat popup
const popup = document.createElement('div');
popup.id = 'popup';
popup.style.position = 'fixed';
popup.style.top = '20px';
popup.style.left = '50%';
popup.style.transform = 'translateX(-50%)';
popup.style.background = '#16a34a';
popup.style.color = 'white';
popup.style.padding = '12px 20px';
popup.style.borderRadius = '8px';
popup.style.display = 'none';
popup.style.zIndex = '999';
popup.innerText = 'Data berhasil dikirim ✅';
document.body.appendChild(popup);

formPengajuan.addEventListener('submit', async function(e){
    e.preventDefault();
    const jenis_pengajuan = formPengajuan.jenis_pengajuan.value;
    const nama = formPengajuan.nama.value;
    const departement = formPengajuan.departement.value;
    const jenis_kendaraan = formPengajuan.jenis_kendaraan.value;
    const periode_awal = formPengajuan.periode_awal.value;
    const periode_akhir = formPengajuan.periode_akhir.value;
    const keterangan = formPengajuan.keterangan.value;

    // Ambil semua plat
    const nopolEls = document.querySelectorAll('#nopolContainer input[name="nomor_plat"]');
    const nomor_plat = Array.from(nopolEls).map(input=>input.value);

    // Buat status admin per plat
    const status_admin_per_plat = nomor_plat.map(p=>"Belum");

    try {
        await db.collection('pengajuan').add({
            jenis_pengajuan, nama, departement, jenis_kendaraan, periode_awal, periode_akhir,
            keterangan, nomor_plat, status_admin_per_plat,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Reset form
        formPengajuan.reset();
        document.getElementById('nopolContainer').innerHTML = '';
        document.getElementById('addNopol').click();

        // Tampilkan popup
        popup.style.display = 'block';
        setTimeout(()=>popup.style.display='none', 3000);

        // Reload data
        loadData();
    } catch(err){
        alert('Gagal mengirim data: '+err);
    }
});
</script>
</body>
</html>
