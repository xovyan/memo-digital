<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Management</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Roboto',sans-serif;}
body {display:flex; min-height:100vh; background:#f5f6fa; color:#222;}

.sidebar {
    width:260px; background:linear-gradient(180deg,#4e54c8,#8f94fb);
    color:white; display:flex; flex-direction:column; padding-top:30px;
}
.sidebar button {background:none;border:none;color:white;padding:18px;cursor:pointer;}
.sidebar button.active {background:rgba(255,255,255,0.2);}

.main {flex:1; padding:20px;}

.tab {display:none;}
.tab.active {display:block;}

table {width:100%; border-collapse:collapse; background:white;}
th,td {padding:10px; border:1px solid #ddd; text-align:center;}
th {background:#4e54c8;color:white;}

.status-aktif{color:green;}
.status-selesai{color:gray;}
.status-sudah{color:blue;}
</style>
</head>

<body>

<div class="sidebar">
<button class="tab-btn active" data-tab="home">🏠 Beranda</button>
<button class="tab-btn" data-tab="pengajuan">📋 Pengajuan</button>
<button class="tab-btn" data-tab="riwayat">📝 Riwayat</button>
</div>

<div class="main">

<!-- HOME -->
<div class="tab active" id="home">
<h3>Dashboard</h3>
<p>Total Aktif: <span id="totalAktif">0</span></p>
</div>

<!-- RIWAYAT -->
<div class="tab" id="riwayat">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Plat</th>
<th>Periode</th>
<th>Dokumen</th>
<th>Foto</th>
</tr>
</thead>
<tbody id="riwayatData"></tbody>
</table>
</div>

<!-- PENGAJUAN -->
<div class="tab" id="pengajuan">
<form id="formPengajuan">

<input type="text" name="nama" placeholder="Nama" required>

<div id="nopolContainer"></div>
<button type="button" id="addNopol">+ Plat</button>

<input type="date" name="periode_awal" required>
<input type="date" name="periode_akhir" required>

<textarea name="keterangan" placeholder="Keterangan"></textarea>

<!-- 🔥 Upload bebas -->
<label>Upload File</label>
<input type="file" id="fileUploadAll">

<!-- 🔥 Kamera -->
<label>Kamera</label>
<input type="file" id="cameraInput" accept="image/*" capture="environment">
<img id="previewCamera" style="width:120px; display:none;">

<button type="submit">Kirim</button>

</form>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCaPM6CNaiK-VZYR0-dkrrYMANiWi8pUGw",
  authDomain: "memodigital-57c0c.firebaseapp.com",
  projectId: "memodigital-57c0c",
  storageBucket: "memodigital-57c0c.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// TAB
document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

// TAMBAH PLAT
document.getElementById("addNopol").onclick=function(){
const div=document.createElement("div");
div.innerHTML=`<input type="text" name="nomor_plat" placeholder="Plat">`;
document.getElementById("nopolContainer").appendChild(div);
};
document.getElementById("addNopol").click();

// PREVIEW
const cameraInput=document.getElementById("cameraInput");
const preview=document.getElementById("previewCamera");

cameraInput.addEventListener("change",()=>{
const file=cameraInput.files[0];
if(file){
preview.src=URL.createObjectURL(file);
preview.style.display="block";
}
});

// SUBMIT
document.getElementById("formPengajuan").addEventListener("submit",async(e)=>{
e.preventDefault();

const form=e.target;

const nopolEls=document.querySelectorAll('[name="nomor_plat"]');
const nomor_plat=[...nopolEls].map(i=>i.value);

let fileDokumenURL="";
let fileKameraURL="";

const fileDokumen=document.getElementById("fileUploadAll").files[0];
const fileKamera=document.getElementById("cameraInput").files[0];

try{

// upload file
if(fileDokumen){
const ref=storage.ref("dokumen/"+Date.now()+"_"+fileDokumen.name);
await ref.put(fileDokumen);
fileDokumenURL=await ref.getDownloadURL();
}

// upload kamera
if(fileKamera){
const ref=storage.ref("kamera/"+Date.now()+"_"+fileKamera.name);
await ref.put(fileKamera);
fileKameraURL=await ref.getDownloadURL();
}

// simpan
await db.collection("pengajuan").add({
nama:form.nama.value,
nomor_plat,
periode_awal:form.periode_awal.value,
periode_akhir:form.periode_akhir.value,
keterangan:form.keterangan.value,
file_dokumen:fileDokumenURL,
file_kamera:fileKameraURL
});

alert("Berhasil!");

form.reset();
preview.style.display="none";
loadData();

}catch(err){
alert(err);
}

});

// LOAD
const tbody=document.getElementById("riwayatData");

async function loadData(){
tbody.innerHTML="";
const snap=await db.collection("pengajuan").get();

snap.forEach(doc=>{
const d=doc.data();

(d.nomor_plat||[]).forEach(p=>{
const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.nama}</td>
<td>${p}</td>
<td>${d.periode_awal} - ${d.periode_akhir}</td>
<td>${d.file_dokumen?`<a href="${d.file_dokumen}" target="_blank">File</a>`:"-"}</td>
<td>${d.file_kamera?`<a href="${d.file_kamera}" target="_blank">Foto</a>`:"-"}</td>
`;

tbody.appendChild(tr);
});

});
}

loadData();
</script>

</body>
</html>
